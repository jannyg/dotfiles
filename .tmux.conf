# Mouse support
set-option -g mouse on
setw -g mode-keys vi

# Mouse wheel scrolling
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

# Terminal type and colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*256col*:Tc"

# Propagate TERM_PROGRAM so tools like Q CLI autocomplete work inside tmux
set-option -ga update-environment "TERM_PROGRAM"

# Improve escape time for vim
set -sg escape-time 1

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Prefix key (default is fine, but you can change it)
# set -g prefix C-a
# unbind C-b
# bind C-a send-prefix

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Option + arrow keys for pane resizing (no prefix needed)
bind -n M-Left resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up resize-pane -U 5
bind -n M-Down resize-pane -D 5

# Alternative horizontal resizing with Ctrl+Option for cases where Option+Left/Right conflict
bind -n C-M-Left resize-pane -L 5
bind -n C-M-Right resize-pane -R 5

# Shift + Option + arrow keys for larger resize steps
bind -n M-S-Left resize-pane -L 10
bind -n M-S-Right resize-pane -R 10
bind -n M-S-Up resize-pane -U 10
bind -n M-S-Down resize-pane -D 10

# Split panes with | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Reload config file
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity on

# Status bar
set -g status-interval 1
set -g status-left-length 30
set -g status-left '#[fg=green](#S) #(whoami)'
set -g status-right '#[fg=yellow]#(sysctl -n vm.loadavg | cut -d" " -f2-4)#[default] #[fg=blue]%H:%M:%S#[default]'

# Copy mode improvements
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
